name: release

# One push to main is one patch bump. The push event fires once per push
# regardless of how many commits it carries, so a hundred local commits landing
# together produce exactly one release. Everything else here exists to make that
# sentence survive re-runs, races, and failures.
on:
  push:
    branches: [main]
  # Re-runnable by hand. `planRelease` skips a commit that is already tagged, so
  # a manual run against a released commit publishes nothing.
  workflow_dispatch:

# The repository default for GITHUB_TOKEN is read-only. A workflow may raise its
# own permissions above that default; it may not exceed what the token can be
# granted. Tag pushes and release creation both need `contents: write`.
permissions:
  contents: write

# Serialize. Two pushes in quick succession must not race for the same version;
# the tag push is the compare-and-swap that would reject the loser, and waiting
# is cheaper than a burned build.
concurrency:
  group: hive-release
  cancel-in-progress: false

jobs:
  release:
    # macOS because the artifacts are Mach-O: `bun build --compile` cross-compiles
    # both CLI slices from here, and `swift build` needs a real toolchain. Signing
    # and notarization need the same real macOS tools (codesign, notarytool).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          # planRelease needs every tag to find the highest patch, and the tags
          # are what make the bump idempotent.
          fetch-depth: 0
          fetch-tags: true

      # Pinned, not floating: the release binary embeds this Bun's runtime.
      # `test/release/contract.test.ts` ("pins the same Bun the project pins")
      # fails if this drifts from package.json's `packageManager` field.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # Defect D4: the memory self-test's semantic assertions SKIP unless a
      # real embedder is present, so the default probe above is no gate on the
      # semantic leg. This step is the gate: --strict turns any SKIP into a
      # FAIL, and HIVE_MEMORY_SELF_TEST_EMBEDDINGS=1 loads the real local
      # model (in-process from node_modules — plain `bun` exits cleanly where
      # `bun test` would hit the onnxruntime teardown SIGTRAP). A failed model
      # download or load is therefore red, not silently skipped.
      - name: Cache the embedding model (~90 MB, downloaded once)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/hive-home/models
          key: memory-embeddings-model-bge-small-en-v1.5

      - name: Memory self-test (strict, real embeddings)
        env:
          # runMemorySelfTest captures the models dir from HIVE_HOME before
          # redirecting it to a throwaway fixture home, so the download lands
          # here and rides the cache above. fastembed's cache mkdir is not
          # recursive, so HIVE_HOME itself must exist first.
          HIVE_HOME: ${{ runner.temp }}/hive-home
          HIVE_MEMORY_SELF_TEST_EMBEDDINGS: "1"
        run: |
          set -euo pipefail
          mkdir -p "$HIVE_HOME"
          bun run src/cli.ts memory self-test --strict

      # The bump rule is a tested pure function; this step is its adapter.
      - name: Plan the release
        id: plan
        run: bun run src/release/plan-cli.ts "$GITHUB_SHA"

      - name: Nothing to release
        if: steps.plan.outputs.action != 'release'
        run: echo "::notice::${{ steps.plan.outputs.version }} — this commit is already released."

      # Hive builds the repository graph during init, so every registry entry
      # must resolve to the matching platform asset and pin.
      - name: Verify Graphify bundles
        if: steps.plan.outputs.action == 'release'
        run: bun run scripts/verify-graphify-artifacts.ts

      # The Gate 6 lock restores every lib-vt-authored split through the
      # ReleaseFast GhosttyKit surface on both macOS architectures. Build in a
      # fresh per-run cache: a cache directory alone cannot establish the
      # patched-tree or optimize-mode identity of an artifact.
      - name: Build and release-lock GhosttyKit
        if: steps.plan.outputs.action == 'release'
        env:
          HIVE_NATIVE_CACHE: ${{ runner.temp }}/hive-native
        run: |
          set -euo pipefail
          brew install zig@0.15
          brew link --force zig@0.15
          scripts/provision-native-toolchain.sh
          scripts/build-ghosttykit.sh --production

      # Graceful degradation lives here, not in a flag. If the Apple certificate
      # secret is absent the build stays unsigned and publishes exactly today's
      # artifacts; if the offline release key is absent the manifest stays
      # unsigned. Present secrets turn each on automatically, with no other edit.
      - name: Detect signing configuration
        id: cfg
        if: steps.plan.outputs.action == 'release'
        env:
          APPLE_CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MANIFEST_PRIVATE: ${{ secrets.HIVE_RELEASE_PRIVATE_KEY }}
          MANIFEST_PUBLIC: ${{ secrets.HIVE_RELEASE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${APPLE_CERT:-}" ]; then
            echo "apple=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No MACOS_CERT_P12_BASE64 secret; publishing UNSIGNED, un-notarized artifacts."
          fi
          # The manifest key is both-or-neither. Embedding the public half without
          # signing with the private half would flip verification fail-closed and
          # then refuse the very release it shipped in — so a half-configured key
          # is a hard error, not a silent half-signed release.
          if [ -n "${MANIFEST_PRIVATE:-}" ] && [ -z "${MANIFEST_PUBLIC:-}" ]; then
            echo "::error::HIVE_RELEASE_PRIVATE_KEY is set but HIVE_RELEASE_PUBLIC_KEY is not; set both or neither."
            exit 1
          fi
          if [ -z "${MANIFEST_PRIVATE:-}" ] && [ -n "${MANIFEST_PUBLIC:-}" ]; then
            echo "::error::HIVE_RELEASE_PUBLIC_KEY is set but HIVE_RELEASE_PRIVATE_KEY is not; embedding the public key without signing would refuse every update."
            exit 1
          fi
          if [ -n "${MANIFEST_PRIVATE:-}" ]; then
            echo "manifest=true" >> "$GITHUB_OUTPUT"
          else
            echo "manifest=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No HIVE_RELEASE_PRIVATE_KEY secret; the manifest will be published unsigned."
          fi

      # Import the Developer ID certificate into a throwaway keychain and write
      # the App Store Connect API key to disk, both under RUNNER_TEMP so they
      # vanish with the runner. The signing identity is read back out of the
      # imported certificate and handed to the build step as an output —
      # codesign matches on the certificate's common name and nothing else, so
      # a hand-typed identity string is a second copy of a string the
      # certificate already carries, and drift between them fails the build
      # with a bare "no identity found". Deriving it also makes the certificate
      # secret the single switch for Apple signing end to end.
      - name: Set up signing keychain and notary key
        id: keychain
        if: steps.plan.outputs.action == 'release' && steps.cfg.outputs.apple == 'true'
        env:
          CERT_P12: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          NOTARY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/hive-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          printf '%s' "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          # Let codesign use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so codesign sees the cert.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["]//g')
          rm -f "$RUNNER_TEMP/cert.p12"

          # Resolve the identity from what was actually imported. Zero valid
          # identities here means the .p12 carries the leaf certificate without
          # the "Developer ID Certification Authority" intermediate, so the
          # chain cannot validate — fail with that diagnosis now instead of
          # letting codesign die mid-build with "no identity found". awk, not
          # grep: an empty match must reach the explicit check below, not trip
          # pipefail inside the substitution.
          security find-identity -v -p codesigning "$KEYCHAIN"
          identity="$(
            security find-identity -v -p codesigning "$KEYCHAIN" \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}'
          )"
          if [ -z "$identity" ]; then
            echo "::error::The certificate imported but holds no valid 'Developer ID Application' identity. Re-export the .p12 from Keychain Access with the 'Developer ID Certification Authority' intermediate included."
            exit 1
          fi
          echo "identity=$identity" >> "$GITHUB_OUTPUT"

          printf '%s' "$NOTARY_P8" | base64 --decode > "$RUNNER_TEMP/notary.p8"

      # Build before tagging. A build that fails must not burn a version number,
      # so the tag is minted only once there are artifacts to attach to it.
      #
      # BUN_NO_CODESIGN_MACHO_BINARY is set only when signing: it makes the
      # compiled binary re-signable (oven-sh/bun#29120). The signing env is
      # harmless when signing is off — a skipped keychain step yields an empty
      # identity, and sign.ts takes the unsigned branch.
      # --public-key is passed only when the offline key exists, which is what
      # flips `hive update` verification to fail-closed.
      - name: Build release artifacts
        if: steps.plan.outputs.action == 'release'
        env:
          BUN_NO_CODESIGN_MACHO_BINARY: ${{ steps.cfg.outputs.apple == 'true' && '1' || '' }}
          MACOS_SIGN_IDENTITY: ${{ steps.keychain.outputs.identity }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
          MACOS_NOTARY_KEY_PATH: ${{ steps.cfg.outputs.apple == 'true' && format('{0}/notary.p8', runner.temp) || '' }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          HIVE_SIGN_ENTITLEMENTS: scripts/signing/entitlements.plist
          HIVE_RELEASE_PUBLIC_KEY: ${{ secrets.HIVE_RELEASE_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          args=(
            --version "${{ steps.plan.outputs.version }}"
            --commit "$(git rev-parse --short HEAD)"
            --build-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            --out dist
          )
          if [ -n "${HIVE_RELEASE_PUBLIC_KEY:-}" ]; then
            args+=(--public-key "$HIVE_RELEASE_PUBLIC_KEY")
          fi
          bun run src/release/build.ts "${args[@]}"

      - name: Verify the built CLI reports its own version
        if: steps.plan.outputs.action == 'release'
        run: |
          set -euo pipefail
          chmod +x dist/hive-darwin-arm64
          reported="$(dist/hive-darwin-arm64 --version)"
          echo "$reported"
          case "$reported" in
            *"${{ steps.plan.outputs.version }}"*) ;;
            *) echo "::error::built binary reported '$reported'"; exit 1 ;;
          esac

      # Sign the manifest over its exact bytes with the offline private key. The
      # public half was embedded above, so this is the moment update verification
      # stops being inert. The key touches only this one small script.
      - name: Sign the manifest with the offline release key
        if: steps.plan.outputs.action == 'release' && steps.cfg.outputs.manifest == 'true'
        env:
          HIVE_RELEASE_PRIVATE_KEY: ${{ secrets.HIVE_RELEASE_PRIVATE_KEY }}
        run: bun run scripts/signing/sign-manifest.ts dist/hive-release.json

      # Prove the release we are about to publish is one the client will accept.
      # Verification is fail-closed, so a public/private key pair that disagree —
      # a bad paste into a secret, a half-finished rotation — would publish a
      # release that EVERY installed hive refuses, including the ones that would
      # have carried the fix. Silent at build time, total at update time. This
      # runs the client's own verifyManifest against the key that was actually
      # embedded, before the tag exists, so the failure costs a build and not a
      # version number.
      - name: Verify the manifest signature the client will check
        if: steps.plan.outputs.action == 'release'
        env:
          HIVE_RELEASE_PUBLIC_KEY: ${{ secrets.HIVE_RELEASE_PUBLIC_KEY }}
        run: bun run scripts/signing/verify-manifest.ts dist/hive-release.json

      # The Gatekeeper gate, on the exact bytes a user downloads: codesign
      # --verify --strict everywhere, codesign --check-notarization on the CLI
      # slices (spctl rejects any bare Mach-O, notarized or not), and spctl
      # --assess plus a stapled ticket on the .app. Any defect exits non-zero
      # here, before the tag exists, so a broken signature never burns a version.
      - name: Verify signing and notarization
        if: steps.plan.outputs.action == 'release' && steps.cfg.outputs.apple == 'true'
        run: scripts/signing/verify.sh dist --require-notarization

      # The compare-and-swap. `git push` of a new tag ref fails if the ref
      # exists, so two concurrent runs can never both mint this version.
      - name: Publish the tag
        if: steps.plan.outputs.action == 'release'
        run: |
          set -euo pipefail
          git config user.name "hive-release[bot]"
          git config user.email "hive-release[bot]@users.noreply.github.com"
          git tag -a "${{ steps.plan.outputs.tag }}" -m "hive ${{ steps.plan.outputs.version }}"
          git push origin "refs/tags/${{ steps.plan.outputs.tag }}"

      - name: Publish the release
        if: steps.plan.outputs.action == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.cfg.outputs.apple }}
          MANIFEST_SIGNED: ${{ steps.cfg.outputs.manifest }}
        run: |
          set -euo pipefail
          assets=(
            dist/hive-darwin-arm64
            dist/hive-darwin-x64
            dist/HiveWorkspace.tar.gz
            dist/embeddings-runtime.tar.gz
            dist/hive-release.json
          )
          [ "$MANIFEST_SIGNED" = "true" ] && assets+=(dist/hive-release.json.sig)

          if [ "$MANIFEST_SIGNED" = "true" ]; then
            manifest_line="\`hive update\` verifies each artifact's SHA-256 and the Ed25519 manifest signature against the embedded release key."
          else
            manifest_line="\`hive update\` verifies each artifact's SHA-256 against \`hive-release.json\` and says out loud that the release carries no Hive release-key signature."
          fi

          if [ "$SIGNED" = "true" ]; then
            notes="Automated release of ${{ github.sha }}.

          These artifacts are signed with a Developer ID and notarized by Apple, so macOS
          runs them without a Gatekeeper quarantine prompt. ${manifest_line}
          See docs/release/versioning-and-release.md."
          else
            notes="Automated release of ${{ github.sha }}.

          These artifacts are **not yet signed or notarized**, so macOS quarantines them on
          first run. ${manifest_line} See docs/release/versioning-and-release.md."
          fi

          gh release create "${{ steps.plan.outputs.tag }}" \
            --verify-tag \
            --title "hive ${{ steps.plan.outputs.version }}" \
            --notes "$notes" \
            "${assets[@]}"
